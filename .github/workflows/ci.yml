name: CI

# This project's deps.edn pins langgraph, labor (its bespoke domain
# capability lib -- contracts, timesheets, wages, payroll) and
# langchain-store via in-monorepo :local/root paths
# (../../kotoba-lang/langgraph, .../labor, .../langchain-store), and
# the :dev alias overrides langchain the same way. Those don't resolve
# on a bare single-repo checkout, so the test job reconstructs the
# workspace layout by checking out all four siblings (all PUBLIC) into
# the expected relative paths -- no token needed. Same pattern as
# cloud-itonami-isic-0111 / cloud-itonami-isic-3512 /
# cloud-itonami-isic-8690, plus the labor checkout retailops/4711
# (kotoba-lang/retail) and freightops/4920 (kotoba-lang/logistics)
# established for their own capability-library deps.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.4
        with: { cli: latest }
      - name: clj-kondo (errors fail the build)
        run: clojure -M:lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { path: orgs/cloud-itonami/cloud-itonami-isic-9700 }
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/langgraph
          path: orgs/kotoba-lang/langgraph
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/langchain
          path: orgs/kotoba-lang/langchain
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/langchain-store
          path: orgs/kotoba-lang/langchain-store
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/labor
          path: orgs/kotoba-lang/labor
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.4
        with: { cli: latest }
      - name: test (governor · phases · registry · store contract · operation)
        working-directory: orgs/cloud-itonami/cloud-itonami-isic-9700
        run: clojure -M:dev:test
      - name: demo runner (compiled StateGraph, end-to-end)
        working-directory: orgs/cloud-itonami/cloud-itonami-isic-9700
        run: clojure -M:dev:run
